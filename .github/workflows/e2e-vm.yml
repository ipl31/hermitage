name: e2e-vm

# End-to-end test: build the microVM guest and actually BOOT it, confirm it
# reaches a ready state (a oneshot prints a marker to the serial console), then
# confirm clean teardown (the guest powers off and the hypervisor exits).
#
# Strategy (see docs/superpowers/ + research): GitHub-hosted macOS runners cannot
# use vfkit/Virtualization.framework (nested virt is blocked), so the macOS boot
# path uses QEMU+TCG software emulation. The Linux job uses QEMU+KVM for a fast,
# high-confidence boot of the same guest definition.

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

concurrency:
  group: e2e-vm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install CLI deps
        working-directory: cli
        run: bun install --frozen-lockfile
      - name: Run CLI test suite
        working-directory: cli
        run: bun test

  boot-linux-kvm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Build the CI microVM runner (x86_64, QEMU)
        run: nix build .#packages.x86_64-linux.ci-runner --print-build-logs

      - name: Boot the microVM and assert readiness + teardown
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          cd "$workdir"
          echo "Booting microVM (KVM)…"
          # The runner runs in the foreground; the guest powers itself off after
          # printing the marker, so the runner exits on its own. timeout is a
          # safety net in case boot hangs.
          set +e
          timeout 300 "$GITHUB_WORKSPACE/result/bin/microvm-run" 2>&1 | tee boot.log
          rc=$?
          set -e
          echo "runner exit code: $rc"
          echo "----- checking results -----"
          if ! grep -q "HERMIT_CI_VM_READY" boot.log; then
            echo "FAIL: readiness marker not found in console output"
            exit 1
          fi
          echo "PASS: guest reached ready state and powered off (clean teardown)"

  # Build the aarch64-linux guest on a native ARM Linux runner and export its
  # closure, so the macOS job can boot it without a (impossible) Linux builder.
  build-guest-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - name: Build aarch64-linux CI runner closure
        run: nix build .#packages.aarch64-linux.ci-runner --print-build-logs --out-link ci-runner-linux
      - name: Export closure to a file-based binary cache
        run: |
          set -euo pipefail
          mkdir -p closure
          nix copy --to "file://$PWD/closure" ./ci-runner-linux
          tar -C closure -czf guest-closure-aarch64.tgz .
          ls -lh guest-closure-aarch64.tgz
      - uses: actions/upload-artifact@v4
        with:
          name: guest-closure-aarch64
          path: guest-closure-aarch64.tgz
          retention-days: 1

  # Boot the same guest on a GitHub-hosted macOS runner via QEMU+TCG (vfkit/VZ
  # nested virt is unavailable on hosted macOS runners). The darwin qemu runner
  # reuses the imported aarch64-linux guest; accel=hvf:tcg falls back to TCG.
  boot-macos-tcg:
    needs: build-guest-aarch64
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - uses: actions/download-artifact@v4
        with:
          name: guest-closure-aarch64
      - name: Import guest closure into the local store
        run: |
          set -euo pipefail
          mkdir -p closure
          tar -C closure -xzf guest-closure-aarch64.tgz
          nix copy --no-check-sigs --from "file://$PWD/closure" --all
      - name: Build the darwin QEMU runner (guest already imported)
        run: nix build .#packages.aarch64-darwin.ci-runner --print-build-logs --out-link result-ci
      - name: Boot the microVM under TCG, assert readiness + teardown
        run: |
          set -euo pipefail
          echo "===== microvm-run script ====="; cat result-ci/bin/microvm-run || true
          echo "=============================="
          workdir="$(mktemp -d)"; cd "$workdir"
          set +e
          timeout 900 "$GITHUB_WORKSPACE/result-ci/bin/microvm-run" 2>&1 | tee boot.log
          rc=$?
          set -e
          echo "runner exit code: $rc"
          if ! grep -q "HERMIT_CI_VM_READY" boot.log; then
            echo "FAIL: readiness marker not found in console output"
            exit 1
          fi
          echo "PASS: guest booted under QEMU/TCG on macOS and powered off (clean teardown)"
